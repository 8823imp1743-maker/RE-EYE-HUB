name: Monitor Cron

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Cron
        run: |
          curl -X POST "${{ secrets.MONITOR_CRON_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"