name: Monitor Cron

on:
  # 定期実行は cron-job.org に一本化（二重起動防止）
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Cron (manual only — scheduled runs use cron-job.org)
        env:
          CRON_URL: ${{ secrets.MONITOR_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_URL}" ] || [ -z "${CRON_SECRET}" ]; then
            echo "MONITOR_CRON_URL or CRON_SECRET is empty in GitHub Actions secrets"
            exit 1
          fi
          # X-Cron-Secret と Bearer の両方を送る（Vercel / GH どちらの経路でも通る）
          HTTP_CODE=$(curl -sS -o /tmp/cron-body.json -w "%{http_code}" -X POST "${CRON_URL}" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          echo "cron response HTTP ${HTTP_CODE}"
          cat /tmp/cron-body.json
          test "${HTTP_CODE}" = "200"
