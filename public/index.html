<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RE-EYE-HUB</title>
<style>
/* Background is Obsidian Black */
body { 
    margin: 0; 
    background: #000000; 
    color: white; 
    font-family: 'Helvetica Neue', Arial, sans-serif; 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
}
.header { padding: 60px 40px 10px; letter-spacing: 4px; font-weight: 200; }
.scanning { color: #9b59b6; font-size: 12px; margin-top: 5px; opacity: 0.8; }

.main { 
    flex-grow: 1; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
}

/* Displaying your original hero.png centrally */
.hero-image {
    width: 90vw;
    height: auto;
    max-height: 55vh;
    object-fit: contain;
    /* Gentle glow effect */
    filter: drop-shadow(0 0 30px rgba(155, 89, 182, 0.3));
}

.prism-title {
    margin-top: 30px;
    font-size: 32px;
    letter-spacing: 12px;
    font-weight: 400;
}
</style>
</head>
<body>
<div class="header">
    RE-EYE-HUB //<br>
    <div class="scanning">SCANNING</div>
</div>

<div class="main">
    <img src="/hero.png" class="hero-image">
    <div class="prism-title">PRISM FLOW</div>
</div>
</body>
</html>
