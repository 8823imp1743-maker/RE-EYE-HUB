<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RE-EYE-HUB</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --obsidian: #0a0a0a;
            --amethyst: #9b59b6;
            --gold: #d4af37;
            --platinum: #e5e4e2;
            --pearl: rgba(255, 255, 255, 0.03);
        }
        body {
            margin: 0;
            background-color: var(--obsidian);
            color: var(--platinum);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        /* 背景：真珠のような光沢（パールテクスチャ） */
        .pearl-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--pearl), transparent);
            pointer-events: none;
            z-index: 0;
        }
        /* 1. メイン画面: PRISM FLOW */
        #prism-flow {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            z-index: 1;
            position: relative;
        }
        .crystal {
            width: 220px;
            height: 220px;
            background: linear-gradient(45deg, var(--amethyst), #4a148c);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 60px var(--amethyst);
            margin-bottom: 40px;
            animation: pulse 3s infinite ease-in-out;}
        /* 2. サブ画面: ARCHITECTIN (非表示時はhidden) */
        #architectin {
            display: none;
            padding: 40px 20px;
            height: 100vh;
            box-sizing: border-box;
            background-image: linear-gradient(var(--pearl) 1px, transparent 1px), linear-gradient(90deg, var(--pearl) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
            position: relative;
        }
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }
        .card {
            border: 1px solid rgba(229, 228, 226, 0.2);
            padding: 20px;
            background: rgba(0,0,0,0.8);
            position: relative;
        }
        /* 共通ボタン */
        .btn {
            background: none;
            border: 1px solid var(--platinum);
            color: var(--platinum);
            padding: 15px 30px;
            margin: 10px;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 2px;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="pearl-bg"></div>

    <div id="prism-flow">
        <div style="font-size: 10px; letter-spacing: 5px; opacity: 0.5;">RE-EYE-HUB // SCANNING</div>
        <div class="crystal"></div>
        <div style="font-size: 24px; letter-spacing: 3px; font-weight: bold;">PRISM FLOW</div>
        <div style="margin-top: 40px;">
            <button class="btn" onclick="requestPermission()">1. 通知を許可</button>
            <button class="btn" style="background-color: var(--amethyst); border: none;" onclick="sendTestNotification()">2. テスト通知を飛ばす</button>
            <button class="btn" style="border: none; color: var(--gold);" onclick="toggleView()">SETTINGS (ARCHITECTIN) へ</button>
        </div>
    </div>

    <div id="architectin">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 18px; letter-spacing: 2px;">ARCHITECTIN // STATUS</div>
            <button class="btn" style="border: none;" onclick="toggleView()">CLOSE</button>
        </div>
        <div class="card-grid">
            <div class="card"><small>RAKUTEN // ACTIVE</small><div style="color: var(--gold); margin-top: 10px;">CALIBRATED</div></div>
            <div class="card"><small>YAHOO // STANDBY</small><div style="color: var(--gold); margin-top: 10px;">READY</div></div>
            <div class="card"><small>AMAZON // SCANNING</small><div style="color: var(--gold); margin-top: 10px;">READY</div></div>
            <div class="card"><small>MONOTARO // READY</small><div style="color: var(--gold); margin-top: 10px;">READY</div></div>
        </div>
        <div style="margin-top: 60px; border-top: 1px solid var(--gold); padding-top: 20px;">
            <div style="font-size: 10px; color: var(--gold);">REAL-TIME NET PRICE</div>
            <div style="font-size: 32px; margin-top: 10px;">¥49,800</div>
        </div>
    </div>

    <script>
        // 画面切り替え
        function toggleView() {
            const monitor = document.getElementById('prism-flow');
            const settings = document.getElementById('architectin');
            if (monitor.style.display === 'none') {
                monitor.style.display = 'flex';
                settings.style.display = 'none';
            } else {
                monitor.style.display = 'none';
                settings.style.display = 'block';
            }
        }

        // サービスワーカーの登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(() => {
                console.log('Service Worker Registered');
            });
        }

        // 通知の許可
        async function requestPermission() {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') alert('通知が許可されました。');
        }

        // テスト通知の送信
        function sendTestNotification() {
            if (Notification.permission === 'granted') {
                const n = new Notification('RAKUTEN // CHECKOUT READY', {
                    body: '【緊急】限定ベビーカーBLACK EDITION',
                    data: { url: 'https://www.rakuten.co.jp/' } // 実際は決済ページへ
                });
            } else {
                alert('先に「通知を許可」を押してください。');
            }
        }
    </script>
</body>
</html>
