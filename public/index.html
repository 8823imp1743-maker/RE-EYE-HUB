<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RE-EYE-HUB</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --obsidian: #0a0a0a;
            --amethyst: #9b59b6;
            --teal: #1abc9c;
            --platinum: #e5e4e2;
            --glass: rgba(255, 255, 255, 0.07);
        }
        body {
            margin: 0;
            background-color: var(--obsidian);
            color: var(--platinum);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 60px 25px 40px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* ヘッダーセクション */
        .header { margin-bottom: 20px; }
        .header h1 { font-size: 26px; font-weight: 300; letter-spacing: 3px; margin: 0; }
        .header .status { font-size: 13px; letter-spacing: 2px; opacity: 0.7; margin-top: 5px; }

        /* 中央のクリスタル（アニメーションなし・静止） */
        .crystal-zone {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .crystal-main {
            width: 200px;
            height: 200px;
            position: relative;
            background: linear-gradient(135deg, rgba(26, 188, 156, 0.5), rgba(155, 89, 182, 0.5));
            clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
            box-shadow: 0 0 60px rgba(155, 89, 182, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            /* animation: pulse ... は完全に削除しました */
        }
        .prism-title {
            margin-top: 40px;
            font-size: 28px;
            letter-spacing: 6px;
            font-weight: 500;
        }

        /* ステータスグリッド */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .status-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .card-label {
            font-size: 10px;
            letter-spacing: 1px;
            opacity: 0.6;
            display: flex;
            flex-direction: column;
        }
        .card-value {
            font-size: 13px;
            color: var(--teal);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>RE-EYE-HUB //</h1>
        <div class="status">SCANNING</div>
    </div>

    <div class="crystal-zone">
        <div class="crystal-main"></div>
        <div class="prism-title">PRISM FLOW</div>
    </div>

    <div class="status-grid">
        <div class="status-card">
            <div class="card-label"><span>MID3D 600G</span><span style="font-size:8px">Finscrtn</span></div>
            <div class="card-value">$8.00</div>
        </div>
        <div class="status-card">
            <div class="card-label"><span>RAQUO10</span><span style="font-size:8px">Smetcarro</span></div>
            <div class="card-value" style="color:#9b59b6">EROS</div>
        </div>
        <div class="status-card">
            <div class="card-label"><span>ROLOR A ORIEM</span><span style="font-size:8px">Anmsstoo</span></div>
            <div class="card-value">$0.00</div>
        </div>
        <div class="status-card">
            <div class="card-label"><span>REICB 11B0</span><span style="font-size:8px">Kererenio</span></div>
            <div class="card-value" style="color:#d35400">28.1.0</div>
        </div>
        <div class="status-card">
            <div class="card-label"><span>FODGET CIDUI</span><span style="font-size:8px">Fsscone</span></div>
            <div class="card-value">$0.00</div>
        </div>
        <div class="status-card">
            <div class="card-label"><span>FIS3AR CORO</span><span style="font-size:8px">Anmsstoo</span></div>
            <div class="card-value" style="color:#1abc9c">$1.00</div>
        </div>
    </div>

    <script>
        // 通知許可だけ裏で取っておく
        if (Notification.permission !== 'granted') {
            document.body.onclick = () => Notification.requestPermission();
        }
    </script>
</body>
</html>
