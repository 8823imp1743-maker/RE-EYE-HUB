<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RE-EYE-HUB</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: Arial; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 60px 40px 10px; letter-spacing: 4px; font-weight: 200; font-size: 24px; }
        .scanning { color: #9b59b6; font-size: 11px; letter-spacing: 2px; margin-top: 5px; opacity: 0.8; }
        .main { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        /* 100%表示されるための設定 */
        .aurora-frame {
            width: 380px;
            max-width: 95%;
            aspect-ratio: 1/1;
            background-image: url("/hero.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 30px rgba(155, 89, 182, 0.4));
        }
    </style>
</head>
<body>
    <div class="header">RE-EYE-HUB // <div class="scanning">SCANNING</div></div>
    <div class="main">
        <div class="aurora-frame"></div>
    </div>
</body>
</html>
